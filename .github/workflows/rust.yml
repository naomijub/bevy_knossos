name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@v6
    - name: Check spelling
      uses: crate-ci/typos@master
      
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Format
      run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install stable@stable toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - name: Install Dependencies
      run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev
    - name: Run Clippy
      run: cargo clippy --locked --all-features --all-targets

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: check
        run: cargo check --locked --all-features

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Install Dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev
      - name: Test
        run: cargo test --locked --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # container:
    #   image: xd009642/tarpaulin:develop-nightly
    #   options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install nightly@nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Install Dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev
      - name: Generate code coverage
        run: |
          cargo +nightly tarpaulin --all-features --workspace --timeout 300 --out Lcov --output-dir ./coverage
      - name: Upload to coveralls.io
        uses: coverallsapp/github-action@v2

  run-bevy_pathfinding-example-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Build bevy
        shell: bash
        run: | 
          WGPU_BACKEND=dx12 TRACE_CHROME=trace-bevy_pathfinding.json CI_TESTING_CONFIG=.github/data/example.ron cargo build --example bevy_pathfinding --release --features "bevy/bevy_ci_testing,bevy/trace_chrome,bevy/trace"
        env:
          RUSTFLAGS: "-C debuginfo=0"
      - name: Run examples
        shell: bash
        env:
          RUSTFLAGS: "-C debuginfo=0"
        run: |
          example_name=`basename pathfinding.ron`
          echo -n $example_name > last_example_run
          echo "running bevy_pathfinding - "`date`
          time WGPU_BACKEND=dx12 TRACE_CHROME=trace-bevy_pathfinding.json CI_TESTING_CONFIG=.github/data/example.ron cargo run --example bevy_pathfinding --release --features "bevy/bevy_ci_testing,bevy/trace_chrome,bevy/trace"
          sleep 10
          mv screenshot.png screenshots-bevy_pathfinding/
          mkdir traces && mv trace*.json traces/
          mkdir screenshots && mv screenshots-* screenshots/
      - name: save traces
        uses: actions/upload-artifact@v4
        with:
          name: example-traces-windows-bevy_pathfinding-${{ steps.date.outputs.date }}
          path: traces
      - name: save screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-windows-bevy_pathfinding-${{ steps.date.outputs.date }}
          path: screenshots
      - uses: actions/upload-artifact@v4
        if: ${{ failure() && github.event_name == 'pull_request' }}
        with:
          name: example-run-windows-bevy_pathfinding-${{ steps.date.outputs.date }}
          path: example-run/